<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Job Outreach Agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>AI Job Outreach Agent</h1>
      <p class="subtitle">Generate recruiter-personalized outreach emails with LLM + RAG hooks.</p>

      <form id="outreach-form">
        <label>Recruiter Name</label>
        <input id="recruiter_name" required />

        <label>Recruiter Email</label>
        <input id="recruiter_email" type="email" required />

        <label>Recruiter Profile (LinkedIn summary, notes, etc.)</label>
        <textarea id="recruiter_profile" rows="4" required></textarea>

        <label>Job Link (optional if Job Description is provided)</label>
        <input id="job_link" type="url" placeholder="https://careers.company.com/job/123" />

        <label>Job Description (optional if Job Link is provided)</label>
        <textarea id="job_description" rows="7"></textarea>

        <label>Upload Resume (.pdf, .docx, .txt)</label>
        <input id="resume_file" type="file" accept=".pdf,.docx,.txt" />

        <label>Resume Text (optional fallback if no file uploaded)</label>
        <textarea id="resume_text" rows="8"></textarea>

        <div class="actions">
          <button type="button" id="btn-keywords">Extract Keywords</button>
          <button type="button" id="btn-summary">Summarize Job</button>
          <button type="button" id="btn-parse">Parse Job</button>
          <button type="button" id="btn-generate-email">Generate Email</button>
          <button type="button" id="btn-draft">Draft Email</button>
          <button type="button" id="btn-send">Send Email</button>
        </div>

        <label>Generated Email Drafts</label>
        <select id="email_draft_selector">
          <option value="">No generated draft yet</option>
        </select>

        <label>Email Subject</label>
        <input id="email_subject" placeholder="Generated subject will appear here" />

        <label>Email Body</label>
        <textarea id="email_body" rows="12" placeholder="Generated email body will appear here"></textarea>
      </form>

      <section>
        <h2>Output</h2>
        <pre id="output">Run an action to see results...</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
